<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>식단 감시당하기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Black+Han+Sans&display=swap');

:root {
  --bg: #0e0e0e;
  --surface: #181818;
  --surface2: #202020;
  --left: #ff6b35;
  --right: #35c9ff;
  --line: #2a2a2a;
  --text: #f0ede8;
  --muted: #666;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { background:var(--bg); color:var(--text); font-family:'Gowun Dodum',sans-serif; }
body { overflow:hidden; min-height:100dvh; overflow-x:hidden; }

/* ── SETUP ── */
#setup {
  position:fixed; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:28px; padding:32px 20px;
  background:var(--bg); z-index:200; overflow-y:auto;
}

.logo {
  font-family:'Black Han Sans',sans-serif;
  font-size:clamp(28px,8vw,50px);
  text-align:center; line-height:1.25;
}
.logo .lo { color:var(--left); }
.logo .ro { color:var(--right); }

.sub { color:var(--muted); font-size:13px; text-align:center; line-height:1.8; }

.setup-card {
  background:var(--surface); border-radius:24px;
  padding:28px 22px; width:100%; max-width:360px;
  display:flex; flex-direction:column; gap:18px;
}

.field { display:flex; flex-direction:column; gap:7px; }
.lbl { font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }

input[type=text] {
  width:100%; background:var(--surface2);
  border:1.5px solid var(--line); border-radius:12px;
  color:var(--text); font-family:'Gowun Dodum',sans-serif;
  font-size:16px; padding:13px 16px; outline:none;
  transition:border-color .2s; -webkit-appearance:none;
}
input[type=text]:focus { border-color:var(--left); }

.who-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.who-btn {
  padding:16px 8px; border-radius:14px;
  border:2px solid var(--line); background:transparent;
  color:var(--muted); font-family:'Gowun Dodum',sans-serif;
  font-size:15px; cursor:pointer; transition:all .18s; text-align:center;
}
.who-btn.sel-left  { border-color:var(--left);  color:var(--left);  background:rgba(255,107,53,.1); }
.who-btn.sel-right { border-color:var(--right); color:var(--right); background:rgba(53,201,255,.1); }

.time-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

.start-btn {
  width:100%; padding:17px; border:none; border-radius:14px;
  background:var(--left); color:#fff;
  font-family:'Black Han Sans',sans-serif; font-size:17px; letter-spacing:1px;
  cursor:pointer; transition:opacity .2s, transform .15s;
}
.start-btn:hover  { opacity:.9; }
.start-btn:active { transform:scale(.97); }
.start-btn:disabled { opacity:.28; cursor:not-allowed; transform:none; }

.err-msg { font-size:12px; color:#ff5252; text-align:center; min-height:16px; }

/* ── APP ── */
#app { display:none; flex-direction:column; height:100dvh; }

.hdr {
  flex-shrink:0;
  background:rgba(14,14,14,.96); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--line); padding:14px 18px;
  display:flex; align-items:center; justify-content:space-between;
  z-index:40;
}
.hdr-title { font-family:'Black Han Sans',sans-serif; font-size:14px; letter-spacing:.5px; }
.hdr-right { display:flex; align-items:center; gap:10px; }
.hdr-names { display:flex; gap:12px; align-items:center; }
.n-badge { display:flex; align-items:center; gap:5px; font-size:12px; }
.n-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.n-dot.l { background:var(--left); }
.n-dot.r { background:var(--right); }
.hdr-vs { font-size:10px; color:var(--muted); }
.coin-badge {
  font-size:11px; color:var(--text);
  background:var(--surface2); border-radius:20px;
  padding:3px 9px; border:1px solid var(--line); white-space:nowrap;
}
.logout-btn {
  font-size:11px; color:var(--muted); background:none; border:none;
  cursor:pointer; padding:4px 8px; font-family:'Gowun Dodum',sans-serif;
}

/* ── TIMELINE ── */
.tl-wrap { flex:1; overflow-y:auto; position:relative; padding-bottom:110px; -webkit-overflow-scrolling:touch; }
.tl-line {
  position:absolute; left:50%; top:0; bottom:0; width:1px;
  background:linear-gradient(to bottom, transparent 0%, #2a2a2a 40px, #2a2a2a calc(100% - 40px), transparent 100%);
  transform:translateX(-50%); pointer-events:none;
}

.empty {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:16px; padding:100px 32px; color:var(--muted); text-align:center;
}
.empty-eye { font-size:48px; animation:blink 3.5s infinite; }
@keyframes blink { 0%,88%,100%{opacity:1} 93%{opacity:0} }
.empty p { font-size:14px; line-height:1.8; }

.date-div {
  display:flex; align-items:center; padding:28px 20px 18px; gap:0; position:relative;
}
.date-div .dd-line { flex:1; height:1px; background:var(--line); }
.date-div .dd-text {
  font-size:11px; letter-spacing:1.5px; color:var(--muted);
  padding:5px 14px; background:var(--bg);
  border:1px solid var(--line); border-radius:20px; white-space:nowrap; z-index:2;
}

.warn-msg {
  text-align:center; font-size:13px; color:#ff5252;
  padding:8px 0 4px; letter-spacing:1px;
}

.mrow {
  display:grid; grid-template-columns:1fr 20px 1fr;
  align-items:start; padding:0 14px; margin-bottom:4px;
  position:absolute; width:100%;
  animation:pop .3s ease forwards; opacity:0;
}
@keyframes pop { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.tdot {
  position:absolute; left:50%; top:22px;
  width:9px; height:9px; border-radius:50%;
  border:2px solid var(--bg); transform:translateX(-50%); z-index:3;
}
.mrow.ml .tdot { background:var(--left); }
.mrow.mr .tdot { background:var(--right); }

.mcrd {
  border-radius:14px; overflow:hidden;
  max-width:148px; width:100%;
  box-shadow:0 4px 20px rgba(0,0,0,.6);
  margin:12px 0; aspect-ratio:1; background:var(--surface2);
  cursor:pointer; transition:transform .15s;
}
.mcrd:active { transform:scale(.96); }
.mrow.ml .mcrd { justify-self:end; margin-right:14px; border-top-right-radius:3px; }
.mrow.mr .mcrd { justify-self:start; margin-left:14px; border-top-left-radius:3px; }
.mcrd img { width:100%; height:100%; object-fit:cover; display:block; }
.mrow-center { position:relative; }

/* 스택 카드 그림자 */
.mcrd.stacked { box-shadow:0 -6px 20px rgba(0,0,0,.8); }

/* ── FAB ── */
.fab {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
  background:var(--left); color:#fff; border:none; border-radius:56px;
  padding:15px 28px; font-family:'Black Han Sans',sans-serif;
  font-size:15px; letter-spacing:1px; cursor:pointer;
  box-shadow:0 8px 28px rgba(255,107,53,.4);
  display:flex; align-items:center; gap:8px;
  transition:transform .2s; z-index:30; white-space:nowrap;
}
.fab:active { transform:translateX(-50%) scale(.95); }

/* ── 업로드 MODAL ── */
.backdrop {
  position:fixed; inset:0; background:rgba(0,0,0,.8);
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  z-index:50; display:flex; align-items:flex-end; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .22s;
}
.backdrop.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--surface); border-radius:26px 26px 0 0;
  width:100%; max-width:500px; padding:18px 20px 48px;
  display:flex; flex-direction:column; gap:14px;
  transform:translateY(40px); transition:transform .28s cubic-bezier(.4,0,.2,1);
  max-height:92dvh; overflow-y:auto;
}
.backdrop.open .modal { transform:translateY(0); }
.modal-handle { width:36px; height:4px; background:var(--line); border-radius:2px; margin:0 auto -2px; }
.modal-title { font-family:'Black Han Sans',sans-serif; font-size:17px; text-align:center; }

.prev-box {
  width:100%; aspect-ratio:1; background:var(--surface2);
  border-radius:16px; border:2px dashed var(--line);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; cursor:pointer; position:relative;
  transition:border-color .2s; font-size:42px; flex-shrink:0;
}
.prev-box:active { border-color:var(--left); }
.prev-box img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }

.modal-post {
  background:var(--left); color:#fff; border:none; border-radius:14px;
  padding:16px; font-family:'Black Han Sans',sans-serif;
  font-size:16px; letter-spacing:1px; cursor:pointer;
}
.modal-post:disabled { opacity:.35; cursor:not-allowed; }
.modal-cancel {
  background:none; border:none; color:var(--muted);
  font-family:'Gowun Dodum',sans-serif; font-size:14px; cursor:pointer; text-align:center;
}
.spin {
  display:inline-block; width:16px; height:16px;
  border:2px solid rgba(255,255,255,.3); border-top-color:#fff;
  border-radius:50%; animation:sp .65s linear infinite;
  vertical-align:middle; margin-right:6px;
}
@keyframes sp { to{transform:rotate(360deg)} }

/* ── 이미지 뷰어 ── */
.img-viewer-backdrop {
  position:fixed; inset:0; background:rgba(0,0,0,.92);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  z-index:100; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:12px;
  opacity:0; pointer-events:none; transition:opacity .22s;
  padding:24px 20px 40px;
}
.img-viewer-backdrop.open { opacity:1; pointer-events:all; }
#iv-img {
  width:90vw; max-width:360px; aspect-ratio:1;
  object-fit:cover; border-radius:20px;
  box-shadow:0 8px 40px rgba(0,0,0,.8); flex-shrink:0;
}
.iv-meta { font-size:14px; color:rgba(255,255,255,.7); text-align:center; }
.iv-reactions { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
.iv-reaction-btn {
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15);
  border-radius:20px; padding:6px 12px; font-size:18px; cursor:pointer;
  transition:transform .15s, background .15s;
}
.iv-reaction-btn:active { transform:scale(1.2); }
.iv-reaction-btn.reacted { background:rgba(255,107,53,.2); border-color:var(--left); }
.iv-comments {
  width:100%; max-width:360px; max-height:120px;
  overflow-y:auto; display:flex; flex-direction:column; gap:6px;
}
.iv-comment {
  background:rgba(255,255,255,.06); border-radius:10px;
  padding:7px 12px; font-size:12px; color:var(--text); line-height:1.5;
}
.iv-comment .cv-name { font-size:10px; color:var(--muted); margin-bottom:2px; }
.iv-input-row { display:flex; gap:8px; width:100%; max-width:360px; }
.iv-input-row input {
  flex:1; background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15); border-radius:12px;
  color:var(--text); font-family:'Gowun Dodum',sans-serif;
  font-size:14px; padding:10px 14px; outline:none; -webkit-appearance:none;
}
.iv-input-row button {
  background:var(--left); border:none; border-radius:12px;
  color:#fff; font-family:'Black Han Sans',sans-serif;
  font-size:13px; padding:10px 16px; cursor:pointer;
}
.iv-close {
  position:absolute; top:20px; right:20px;
  background:rgba(255,255,255,.1); border:none; color:#fff;
  width:36px; height:36px; border-radius:50%;
  font-size:14px; cursor:pointer; z-index:101;
}

/* ── 시간 경고 토스트 ── */
.time-toast {
  position:fixed; top:70px; left:50%; transform:translateX(-50%);
  background:var(--surface); border:1px solid var(--left);
  border-radius:16px; padding:14px 20px; font-size:13px;
  color:var(--text); text-align:center; z-index:90;
  box-shadow:0 4px 20px rgba(0,0,0,.6); max-width:280px;
  line-height:1.6; cursor:pointer;
  animation:slideDown .3s ease;
}
@keyframes slideDown { from{opacity:0;transform:translateX(-50%) translateY(-10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
</style>
</head>
<body>

<!-- ── SETUP ── -->
<div id="setup">
  <div class="logo">👁<br><span class="lo">식단</span> <span class="ro">감시당하기</span></div>
  <p class="sub">오늘 뭐 먹었는지 서로 감시해요<br>사진에 시간 + 메뉴명이 자동으로 찍혀요</p>

  <div class="setup-card">
    <div class="field">
      <div class="lbl">방 코드</div>
      <input type="text" id="i-room" placeholder="두 사람 동일하게 입력" maxlength="30" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="field">
      <div class="lbl">나는 누구?</div>
      <div class="who-grid">
        <button class="who-btn" id="wb-left"  onclick="pickSide('left')">🍊 왼쪽</button>
        <button class="who-btn" id="wb-right" onclick="pickSide('right')">🫐 오른쪽</button>
      </div>
    </div>
    <div class="field">
      <div class="lbl">내 이름 / 닉네임</div>
      <input type="text" id="i-name" placeholder="예: 소현" maxlength="10">
    </div>
    <div class="field">
      <div class="lbl">취침 / 기상 시간</div>
      <div class="time-grid">
        <input type="text" id="i-sleep" placeholder="취침 예: 24:00" maxlength="5">
        <input type="text" id="i-wake"  placeholder="기상 예: 07:30" maxlength="5">
      </div>
    </div>
    <div class="err-msg" id="err-msg"></div>
    <button class="start-btn" id="btn-start" onclick="startApp()" disabled>감시 시작 👁</button>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <div class="hdr">
    <div class="hdr-title">👁 식단 감시당하기</div>
    <div class="hdr-right">
      <div class="coin-badge" id="my-coin">🪙 0</div>
      <div class="hdr-names">
        <div class="n-badge"><div class="n-dot l"></div><span id="dn-left">—</span></div>
        <div class="hdr-vs">vs</div>
        <div class="n-badge"><div class="n-dot r"></div><span id="dn-right">—</span></div>
      </div>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="tl-wrap" id="tl-wrap">
    <div class="tl-line"></div>
    <div class="empty" id="emptystate">
      <div class="empty-eye">👁</div>
      <p>아직 아무도 안 먹었네요<br>밥 먹으면 제일 먼저 올려봐요</p>
    </div>
    <div id="timeline"></div>
  </div>

  <button class="fab" id="fab-btn" onclick="openModal()">📸 지금 먹어요</button>
</div>

<!-- ── 업로드 MODAL ── -->
<div class="backdrop" id="backdrop">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">뭐 드셨어요? 🍽</div>
    <div class="prev-box" id="prevbox" onclick="triggerFile()">
      <span id="prev-icon">📷</span>
      <input type="file" id="fileinput" accept="image/*" capture="environment" style="display:none">
    </div>
    <input type="text" id="notetxt" placeholder="메뉴명 (예: 된장찌개 + 공기밥)" maxlength="20">
    <button class="modal-post" id="postbtn" onclick="doPost()">올리기</button>
    <button class="modal-cancel" onclick="closeModal()">취소</button>
  </div>
</div>

<!-- ── 이미지 뷰어 ── -->
<div class="img-viewer-backdrop" id="img-viewer">
  <button class="iv-close" onclick="closeViewer()">✕</button>
  <img id="iv-img" src="" alt="">
  <div class="iv-meta" id="iv-meta"></div>
  <div class="iv-reactions" id="iv-reactions"></div>
  <div class="iv-comments" id="iv-comments"></div>
  <div class="iv-input-row">
    <input type="text" id="iv-comment-input" placeholder="댓글 입력..." maxlength="50">
    <button onclick="postComment()">전송</button>
  </div>
</div>

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
/* ══════════════════════════════════════════
   🔥 FIREBASE CONFIG
══════════════════════════════════════════ */
var FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAR2J3l1yqs_k8CGWkT-vUQsH_PTXrvAQI",
  authDomain:        "food-diary-watcher.firebaseapp.com",
  databaseURL:       "https://food-diary-watcher-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "food-diary-watcher",
  storageBucket:     "food-diary-watcher.firebasestorage.app",
  messagingSenderId: "588037697607",
  appId:             "1:588037697607:web:7745740c19aab0dd27c162"
};

var CLOUDINARY_CLOUD  = 'dqnt3ybt8';
var CLOUDINARY_PRESET = 'diet_watch_unsigned';

var WARNING_MSGS = [
  '🔫 %s 그만 드세요',
  '🚨 %s 오늘 몇 번째예요',
  '👀 %s 이러다 큰일 나요',
  '🤦 %s 진심이에요?',
  '📢 %s 식욕을 다스리세요'
];

var EMOJIS = ['❤️','😂','😮','👍','🥲','🔫'];

/* ── 상태 ── */
var mySide  = null;
var myName  = '';
var roomId  = '';
var selFile = null;
var busy    = false;
var db;
var SAVE_KEY = 'diet_watch_v1';
var currentMealKey = null;
var cachedNames = {};

/* ── restore session ── */
(function() {
  try {
    var s = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (!s) return;
    document.getElementById('i-room').value  = s.room  || '';
    document.getElementById('i-name').value  = s.name  || '';
    document.getElementById('i-sleep').value = s.sleepTime || '';
    document.getElementById('i-wake').value  = s.wakeTime  || '';
    if (s.side) pickSide(s.side);
    if (s.autoLogin && s.room && s.name && s.side) {
      setTimeout(startApp, 80);
    }
  } catch(e) {}
})();

function pickSide(s) {
  mySide = s;
  document.getElementById('wb-left').className  = 'who-btn' + (s === 'left'  ? ' sel-left'  : '');
  document.getElementById('wb-right').className = 'who-btn' + (s === 'right' ? ' sel-right' : '');
  chkValid();
}
function chkValid() {
  var r = document.getElementById('i-room').value.trim();
  var n = document.getElementById('i-name').value.trim();
  document.getElementById('btn-start').disabled = !(r && n && mySide);
}
document.getElementById('i-room').addEventListener('input', chkValid);
document.getElementById('i-name').addEventListener('input', chkValid);

/* ── start ── */
function startApp() {
  document.getElementById('err-msg').textContent = '';
  roomId = document.getElementById('i-room').value.trim().replace(/\s+/g,'_').toLowerCase();
  myName = document.getElementById('i-name').value.trim();
  var sleepTime = document.getElementById('i-sleep').value.trim() || '24:00';
  var wakeTime  = document.getElementById('i-wake').value.trim()  || '07:30';
  if (!roomId || !myName || !mySide) return;

  try {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
  } catch(e) {
    document.getElementById('err-msg').textContent = 'Firebase 오류: ' + e.message;
    return;
  }

  localStorage.setItem(SAVE_KEY, JSON.stringify({
    room: roomId, name: myName, side: mySide,
    sleepTime: sleepTime, wakeTime: wakeTime, autoLogin: true
  }));

  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display   = 'flex';
  initApp(sleepTime, wakeTime);
}

function doLogout() {
  localStorage.removeItem(SAVE_KEY);
  location.reload();
}

/* ── init ── */
function initApp(sleepTime, wakeTime) {
  // FAB 색상 + 이름에 (나) 표시
  var fab = document.getElementById('fab-btn');
  if (mySide === 'right') {
    fab.style.background  = 'var(--right)';
    fab.style.boxShadow   = '0 8px 28px rgba(53,201,255,.4)';
  }
  var myBadge = document.getElementById(mySide === 'left' ? 'dn-left' : 'dn-right');
  myBadge.textContent = myName + ' (나)';

  // DB에 이름·설정 저장
  db.ref('rooms/' + roomId + '/names/' + mySide).set(myName);
  db.ref('rooms/' + roomId + '/settings/' + mySide).set({
    sleepTime: sleepTime, wakeTime: wakeTime
  });

  // 이름 실시간 구독
  db.ref('rooms/' + roomId + '/names').on('value', function(snap) {
    var v = snap.val() || {};
    cachedNames = v;
    var leftText  = (v.left  || '왼쪽')  + (mySide === 'left'  ? ' (나)' : '');
    var rightText = (v.right || '오른쪽') + (mySide === 'right' ? ' (나)' : '');
    document.getElementById('dn-left').textContent  = leftText;
    document.getElementById('dn-right').textContent = rightText;
  });

  // 식사 실시간 구독
  db.ref('rooms/' + roomId + '/meals').orderByChild('ts').on('value', function(snap) {
    var arr = [];
    snap.forEach(function(c) {
      var v = c.val();
      v.key = c.key;
      arr.push(v);
    });
    renderTimeline(arr);
  });

  // 코인 표시
  updateCoinDisplay();

  // 어제 클린데이 판정
  judgeYesterday();

  // 시간 경고
  var saved = JSON.parse(localStorage.getItem(SAVE_KEY));
  if (saved && saved.sleepTime && saved.wakeTime) {
    checkTimeWarning(saved.sleepTime, saved.wakeTime);
  }
}

/* ══════════════════════════════════════════
   타임라인 렌더 (페어링 + 스택 레이아웃)
══════════════════════════════════════════ */
function renderTimeline(meals) {
  var tl    = document.getElementById('timeline');
  var empty = document.getElementById('emptystate');
  tl.innerHTML = '';
  if (!meals || meals.length === 0) { empty.style.display = 'flex'; return; }
  empty.style.display = 'none';

  // 날짜별 그룹핑
  var byDate = {}, dateOrder = [];
  meals.forEach(function(m) {
    var t = new Date(m.ts);
    var dk = t.toLocaleDateString('ko-KR', {year:'numeric', month:'long', day:'numeric', weekday:'long'});
    if (!byDate[dk]) { byDate[dk] = []; dateOrder.push(dk); }
    byDate[dk].push(m);
  });

  var names = cachedNames;

  dateOrder.forEach(function(dateKey) {
    // 날짜 구분선
    var div = document.createElement('div');
    div.className = 'date-div';
    div.innerHTML = '<div class="dd-line"></div><div class="dd-text">' + dateKey + '</div><div class="dd-line"></div>';
    tl.appendChild(div);

    var dayMeals = byDate[dateKey];

    // 과식 경고 (5번 이상)
    var leftCount  = dayMeals.filter(function(m){ return m.side === 'left'; }).length;
    var rightCount = dayMeals.filter(function(m){ return m.side === 'right'; }).length;
    if (leftCount >= 5 || rightCount >= 5) {
      var warn = document.createElement('div');
      warn.className = 'warn-msg';
      function randMsg(name) {
        var msg = WARNING_MSGS[Math.floor(Math.random() * WARNING_MSGS.length)];
        return msg.replace('%s', name);
      }
      var txt = '';
      if (leftCount  >= 5) txt += randMsg(names.left  || '왼쪽') + '  ';
      if (rightCount >= 5) txt += randMsg(names.right || '오른쪽');
      warn.textContent = txt.trim();
      tl.appendChild(warn);
    }

    /* ─ 페어링 + 스택 레이아웃 계산 ─ */
    var CARD_H   = 172;
    var PAIR_GAP = 20;   // 페어링: 두 카드 동일 top
    var STACK_DY = 85;   // 스택: 62% 겹침
    var MIN_GAP  = 180;  // 비페어링 최소 간격
    var PAD      = 20;

    var lefts  = dayMeals.filter(function(m){ return m.side === 'left'; });
    var rights = dayMeals.filter(function(m){ return m.side === 'right'; });

    // 그리디 페어링: 좌우를 시간순 정렬 후 가장 가까운 것끼리
    var pairedLeft  = new Array(lefts.length).fill(false);
    var pairedRight = new Array(rights.length).fill(false);
    var pairs = []; // [{left: idx, right: idx}]

    lefts.forEach(function(lm, li) {
      var bestDiff = Infinity, bestRi = -1;
      rights.forEach(function(rm, ri) {
        if (pairedRight[ri]) return;
        var diff = Math.abs(lm.ts - rm.ts);
        if (diff < bestDiff) { bestDiff = diff; bestRi = ri; }
      });
      if (bestRi >= 0) {
        pairs.push({ li: li, ri: bestRi });
        pairedLeft[li]       = true;
        pairedRight[bestRi]  = true;
      }
    });

    // 포지션 맵: mealKey -> top
    var posMap = {};
    var nextTop = PAD;

    // 페어링된 쌍 먼저 배치
    pairs.sort(function(a, b) {
      var tl2 = lefts[a.li].ts, tr2 = rights[a.ri].ts;
      var tl3 = lefts[b.li].ts, tr3 = rights[b.ri].ts;
      return Math.min(tl2, tr2) - Math.min(tl3, tr3);
    });
    pairs.forEach(function(p) {
      var top = nextTop;
      posMap[lefts[p.li].key]  = top;
      posMap[rights[p.ri].key] = top;
      nextTop = top + MIN_GAP;
    });

    // 페어링 안 된 항목 (한쪽 스택)
    // side별로 미페어링 항목 추출 → 같은 side내 1시간 이내면 스택
    function placeSolo(items, paired) {
      var unpaired = items.filter(function(m, i){ return !paired[i]; });
      if (unpaired.length === 0) return;
      unpaired.sort(function(a,b){ return a.ts - b.ts; });
      var prevTop = null, prevTs = null;
      unpaired.forEach(function(m) {
        var top;
        if (prevTop !== null && (m.ts - prevTs) < 3600000) {
          // 스택
          top = prevTop + STACK_DY;
        } else {
          top = nextTop;
          nextTop = top + MIN_GAP;
        }
        posMap[m.key] = top;
        if (top + MIN_GAP > nextTop) nextTop = top + MIN_GAP;
        prevTop = top; prevTs = m.ts;
      });
    }
    placeSolo(lefts,  pairedLeft);
    placeSolo(rights, pairedRight);

    // 전체 높이 계산
    var maxTop = PAD;
    Object.values(posMap).forEach(function(t){ if (t > maxTop) maxTop = t; });
    var DAY_H = maxTop + CARD_H + PAD;

    var wrap = document.createElement('div');
    wrap.style.cssText = 'position:relative; height:' + DAY_H + 'px;';
    tl.appendChild(wrap);

    // 스택 여부 판단 (같은 사이드에서 연속 스택)
    var stackedKeys = {};
    ['left','right'].forEach(function(side) {
      var sideItems = dayMeals.filter(function(m){ return m.side === side; }).sort(function(a,b){ return a.ts - b.ts; });
      for (var i = 1; i < sideItems.length; i++) {
        if ((sideItems[i].ts - sideItems[i-1].ts) < 3600000) {
          stackedKeys[sideItems[i].key] = true;
        }
      }
    });

    dayMeals.forEach(function(m, globalIdx) {
      var top = posMap[m.key];
      if (top === undefined) top = PAD + globalIdx * MIN_GAP;

      var hhmm = new Date(m.ts).toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit', hour12:false});
      var isStacked = stackedKeys[m.key];
      var stackStyle = isStacked ? ' stacked' : '';

      var barColor = m.side === 'left' ? 'var(--left)' : 'var(--right)';
      var barStyle = 'box-shadow:inset 0 4px 0 0 ' + barColor + ';';

      // z-index: 스택일수록 높게 (나중에 올린 것이 위에)
      var zIdx = isStacked ? globalIdx + 10 : 1;

      var card   = '<div class="mcrd' + stackStyle + '" style="' + barStyle + 'z-index:' + zIdx + '" '
                 + 'onclick="openViewer(\'' + escStr(m.url) + '\',\'' + hhmm + '\',\'' + escStr(m.menu||'') + '\',\'' + escStr(m.key) + '\')">'
                 + '<img src="' + escStr(m.url) + '" loading="lazy"></div>';
      var center = '<div class="mrow-center"><div class="tdot"></div></div>';
      var blank  = '<div></div>';

      var row = document.createElement('div');
      row.className = 'mrow ' + (m.side === 'left' ? 'ml' : 'mr');
      row.style.cssText = 'position:absolute; top:' + top + 'px; width:100%;';
      row.innerHTML = m.side === 'left' ? card + center + blank : blank + center + card;
      wrap.appendChild(row);
    });
  });

  requestAnimationFrame(function() {
    var tw = document.getElementById('tl-wrap');
    tw.scrollTop = tw.scrollHeight;
  });
}

function escStr(s) {
  return String(s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

/* ══════════════════════════════════════════
   이미지 뷰어
══════════════════════════════════════════ */
function openViewer(url, time, menu, mealKey) {
  document.getElementById('iv-img').src = url;
  document.getElementById('iv-meta').textContent = time + (menu ? '  ' + menu : '');
  currentMealKey = mealKey;
  var rb = document.getElementById('iv-reactions');
  rb.innerHTML = EMOJIS.map(function(e) {
    return '<button class="iv-reaction-btn" data-emoji="' + e + '" onclick="toggleReaction(\'' + e + '\')">' + e + '</button>';
  }).join('');
  loadViewerData(mealKey);
  document.getElementById('img-viewer').classList.add('open');
}

function closeViewer() {
  document.getElementById('img-viewer').classList.remove('open');
  currentMealKey = null;
}

document.getElementById('img-viewer').addEventListener('click', function(e) {
  if (e.target === this) closeViewer();
});

function loadViewerData(mealKey) {
  // 반응
  db.ref('rooms/' + roomId + '/reactions/' + mealKey).once('value', function(snap) {
    var data = snap.val() || {};
    var myReactions = data[mySide] || {};
    document.querySelectorAll('.iv-reaction-btn').forEach(function(btn) {
      var hex = encodeEmoji(btn.dataset.emoji);
      btn.classList.toggle('reacted', !!myReactions[hex]);
    });
  });
  // 댓글
  db.ref('rooms/' + roomId + '/comments/' + mealKey).once('value', function(snap) {
    var data = snap.val() || {};
    var list = Object.values(data);
    list.sort(function(a,b){ return a.ts - b.ts; });
    var el = document.getElementById('iv-comments');
    el.innerHTML = list.map(function(c) {
      return '<div class="iv-comment"><div class="cv-name">' + (c.name||'') + '</div>' + (c.text||'') + '</div>';
    }).join('');
    el.scrollTop = el.scrollHeight;
  });
}

function encodeEmoji(e) {
  return (e.codePointAt(0)||0).toString(16);
}

function toggleReaction(emoji) {
  if (!currentMealKey) return;
  var hex  = encodeEmoji(emoji);
  var path = 'rooms/' + roomId + '/reactions/' + currentMealKey + '/' + mySide + '/' + hex;
  db.ref(path).once('value', function(snap) {
    if (snap.val()) {
      db.ref(path).remove().then(function(){ loadViewerData(currentMealKey); });
    } else {
      db.ref(path).set(true).then(function(){ loadViewerData(currentMealKey); });
    }
  });
}

function postComment() {
  var input = document.getElementById('iv-comment-input');
  var text  = input.value.trim();
  if (!text || !currentMealKey) return;
  db.ref('rooms/' + roomId + '/comments/' + currentMealKey).push({
    name: myName, text: text, ts: Date.now()
  }).then(function() {
    input.value = '';
    loadViewerData(currentMealKey);
  });
}

/* ══════════════════════════════════════════
   업로드 모달
══════════════════════════════════════════ */
function openModal() {
  selFile = null;
  document.getElementById('notetxt').value = '';
  var pb = document.getElementById('prevbox');
  pb.innerHTML = '<span id="prev-icon">📷</span><input type="file" id="fileinput" accept="image/*" capture="environment" style="display:none">';
  document.getElementById('fileinput').onchange = fileChosen;
  document.getElementById('backdrop').classList.add('open');
}
function closeModal() { document.getElementById('backdrop').classList.remove('open'); }
document.getElementById('backdrop').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
function triggerFile() { document.getElementById('fileinput').click(); }
function fileChosen(e) {
  var f = e.target.files[0]; if (!f) return;
  selFile = f;
  var r = new FileReader();
  r.onload = function(ev) {
    var pb   = document.getElementById('prevbox');
    var icon = document.getElementById('prev-icon');
    if (icon) icon.style.display = 'none';
    var img = pb.querySelector('img');
    if (!img) { img = document.createElement('img'); pb.appendChild(img); }
    img.src = ev.target.result;
  };
  r.readAsDataURL(f);
}

/* ── 워터마크 스탬프 ── */
function stampImage(file, menuText, cb) {
  var reader = new FileReader();
  reader.onload = function(ev) {
    var img = new Image();
    img.onload = function() {
      var MAX = 400, w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w >= h) { h = Math.round(h*MAX/w); w = MAX; }
        else        { w = Math.round(w*MAX/h); h = MAX; }
      }
      var c = document.createElement('canvas');
      c.width = w; c.height = h;
      var ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);

      var now  = new Date();
      var hhmm = now.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit', hour12:false});
      var cx   = w / 2, cy = h / 2;

      function drawText(text, x, y, size, alpha) {
        ctx.font      = 'bold ' + size + 'px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.fillText(text, x + 2, y + 3);
        ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
        ctx.fillText(text, x, y);
      }

      var timeSize = Math.round(w * 0.22);
      var menuSize = Math.round(w * 0.08);
      if (menuText) {
        var gap    = timeSize * 0.3;
        var totalH = timeSize + gap + menuSize;
        var startY = cy - totalH / 2 + timeSize * 0.8;
        drawText(hhmm,     cx, startY,                   timeSize, 0.95);
        drawText(menuText, cx, startY + gap + menuSize,  menuSize, 0.88);
      } else {
        drawText(hhmm, cx, cy + timeSize * 0.35, timeSize, 0.95);
      }
      cb(c.toDataURL('image/jpeg', 0.4));
    };
    img.onerror = function() { cb(null); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

/* ── 포스트 ── */
function doPost() {
  if (!selFile || busy) return;
  busy = true;
  var btn = document.getElementById('postbtn');
  btn.innerHTML = '<span class="spin"></span> 올리는 중...';
  btn.disabled  = true;

  var menuText = document.getElementById('notetxt').value.trim();
  var now = new Date(), ts = now.getTime();

  stampImage(selFile, menuText, function(dataUrl) {
    var formData = new FormData();
    formData.append('file',           dataUrl);
    formData.append('upload_preset',  CLOUDINARY_PRESET);

    fetch('https://api.cloudinary.com/v1_1/' + CLOUDINARY_CLOUD + '/image/upload', {
      method: 'POST', body: formData
    })
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (!data.secure_url) throw new Error(data.error ? data.error.message : '업로드 실패');
      return db.ref('rooms/' + roomId + '/meals').push({
        side: mySide,
        url:  data.secure_url,
        ts:   ts,
        menu: menuText || null
      });
    })
    .then(function(ref) {
      // key를 meal 자체에도 저장 (반응/댓글 연동용)
      return db.ref('rooms/' + roomId + '/meals/' + ref.key + '/key').set(ref.key);
    })
    .then(function(){ donePost(btn); })
    .catch(function(e){ alert('올리기 실패: ' + e.message); donePost(btn); });
  });
}

function donePost(btn) {
  busy = false; btn.innerHTML = '올리기'; btn.disabled = false;
  selFile = null; closeModal();
}

/* ══════════════════════════════════════════
   시간 경고 팝업
══════════════════════════════════════════ */
function timeToMinutes(str) {
  var parts = (str || '24:00').split(':');
  return parseInt(parts[0]) * 60 + parseInt(parts[1] || 0);
}

function checkTimeWarning(sleepTime, wakeTime) {
  var warnKey = 'diet_warn_' + new Date().toISOString().slice(0, 10);
  if (localStorage.getItem(warnKey)) return;

  var now      = new Date();
  var nowMin   = now.getHours() * 60 + now.getMinutes();
  var sleepMin = timeToMinutes(sleepTime);
  var wakeMin  = timeToMinutes(wakeTime);
  var dangerMin = sleepMin - 240;

  var msg = null;

  if (nowMin >= dangerMin && nowMin < sleepMin) {
    msg = '🍽 잠들기 4시간 전부터는 먹지 마세요!';
  }
  if (sleepMin >= 1440 && nowMin < wakeMin) {
    msg = '😴 잘 시간이에요, 자러 가세요!';
  }
  if (sleepMin < 1440 && (nowMin >= sleepMin || nowMin < wakeMin)) {
    msg = '😴 잘 시간이에요, 자러 가세요!';
  }

  if (msg) {
    localStorage.setItem(warnKey, '1');
    showTimeWarning(msg);
  }
}

function showTimeWarning(msg) {
  var el = document.createElement('div');
  el.className = 'time-toast';
  el.textContent = msg;
  el.onclick = function() { if (el.parentNode) document.body.removeChild(el); };
  document.body.appendChild(el);
  setTimeout(function() {
    if (el.parentNode) document.body.removeChild(el);
  }, 5000);
}

/* ══════════════════════════════════════════
   클린데이 코인 시스템
══════════════════════════════════════════ */
function judgeYesterday() {
  var yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  var dateKey = yesterday.toISOString().slice(0, 10);

  db.ref('rooms/' + roomId + '/cleanDays/' + mySide + '/' + dateKey).once('value', function(snap) {
    if (snap.val() !== null) return; // 이미 판정됨

    db.ref('rooms/' + roomId + '/settings/' + mySide).once('value', function(snap2) {
      var settings  = snap2.val() || {};
      var sleepTime = settings.sleepTime || '24:00';
      var sleepMin  = timeToMinutes(sleepTime);
      var cutoffMin = sleepMin - 240;

      var cutoffTs = new Date(yesterday);
      cutoffTs.setHours(Math.floor(cutoffMin / 60), cutoffMin % 60, 0, 0);

      var dayEnd = new Date(yesterday);
      dayEnd.setHours(23, 59, 59, 999);

      db.ref('rooms/' + roomId + '/meals').once('value', function(snap3) {
        var meals = snap3.val() || {};
        var lateEat = Object.values(meals).some(function(m) {
          return m.side === mySide
            && m.ts >= cutoffTs.getTime()
            && m.ts <= dayEnd.getTime();
        });
        var isClean = !lateEat;
        db.ref('rooms/' + roomId + '/cleanDays/' + mySide + '/' + dateKey).set(isClean);
        if (isClean) addCoin(dateKey);
        else {
          // 연속 끊김
          db.ref('rooms/' + roomId + '/streaks/' + mySide).set(0);
        }
      });
    });
  });
}

function addCoin(dateKey) {
  db.ref('rooms/' + roomId + '/coins/' + mySide).once('value', function(snap) {
    var current = snap.val() || 0;
    db.ref('rooms/' + roomId + '/streaks/' + mySide).once('value', function(snap2) {
      var streak    = snap2.val() || 0;
      var newStreak = streak + 1;
      var bonus = 0;
      if (newStreak === 3) bonus = 1;
      if (newStreak === 7) bonus = 3;
      var earned = 1 + bonus;

      db.ref('rooms/' + roomId + '/coins/' + mySide).set(current + earned);
      db.ref('rooms/' + roomId + '/streaks/' + mySide).set(newStreak);

      // 커플 클린 보너스
      var otherSide = mySide === 'left' ? 'right' : 'left';
      db.ref('rooms/' + roomId + '/cleanDays/' + otherSide + '/' + dateKey).once('value', function(snap3) {
        if (snap3.val() === true) {
          db.ref('rooms/' + roomId + '/coins/' + mySide).set(current + earned + 1);
        }
        updateCoinDisplay();
      });
    });
  });
}

function updateCoinDisplay() {
  db.ref('rooms/' + roomId + '/coins').once('value', function(snap) {
    var data  = snap.val() || {};
    var my    = data[mySide] || 0;
    var other = data[mySide === 'left' ? 'right' : 'left'] || 0;
    var won   = (my + other) * 500;
    document.getElementById('my-coin').textContent =
      '🪙 ' + my + ' (합산 ' + won.toLocaleString() + '원)';
  });
}
